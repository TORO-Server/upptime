name: Graphs CI
on:
  workflow_run:
    workflows: ["Response Time CI"]
    types:
      - completed
  repository_dispatch:
    types: [graphs]
  workflow_dispatch:
concurrency:
  group: upptime-main-commit
  cancel-in-progress: false
jobs:
  release:
    name: Generate graphs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
      - name: Generate graphs
        uses: upptime/uptime-monitor@v1.42.6
        with:
          command: "graphs"
        env:
          GH_PAT: ${{ github.token }}
